<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        background: #fff;
        color: #0d0d0d;
      }
      .logo { display: block; width: 100%; max-width: 180px; margin: 0 auto 8px; }
      h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: -0.01em; text-align: center; }
      .tag { font-size: 11px; color: #8f8f8f; margin-bottom: 12px; text-align: center; }
      p { margin: 0 0 10px; color: #5d5d5d; line-height: 1.5; }
      ol { margin: 0 0 12px 18px; padding: 0; color: #5d5d5d; line-height: 1.6; }
      a { color: #0d0d0d; text-decoration: underline; text-underline-offset: 2px; }
      small { font-size: 11px; color: #8f8f8f; }
      .links {
        display: flex;
        justify-content: center;
        gap: 10px;
        font-size: 12px;
        padding-top: 10px;
        border-top: 1px solid #ececec;
        margin-top: 4px;
      }
      .links span { color: #c0c0c0; }
      .star-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 12px;
        margin: 4px 0 12px;
        border: 1px solid #ececec;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #0d0d0d;
        text-decoration: none;
        transition: border-color 0.15s, background 0.15s;
      }
      .star-cta:hover {
        border-color: #10a37f;
        background: #ecfdf5;
        color: #10a37f;
      }
      .star-icon { color: #eac54f; }
      @media (prefers-color-scheme: dark) {
        body { background: #212121; color: #ececec; }
        p, ol { color: #b4b4b4; }
        a { color: #ececec; }
        .tag, small { color: #8e8e8e; }
        .links { border-top-color: #2f2f2f; }
        .links span { color: #4a4a4a; }
        .star-cta { border-color: #2f2f2f; color: #ececec; }
        .star-cta:hover { background: rgba(16,163,127,0.1); border-color: #10a37f; color: #10a37f; }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="icons/blanq_logo.png" alt="Blanq" />
    <div class="tag">Bulk chat cleaner for ChatGPT</div>
    <ol>
      <li>Open <a href="https://chatgpt.com" target="_blank">chatgpt.com</a></li>
      <li>Click the floating button (bottom-right)</li>
      <li>Filter, select, act</li>
    </ol>
    <p><small>All actions use your logged-in session. No data leaves your browser.</small></p>
    <p><small>Unofficial — not affiliated with OpenAI.</small></p>
    <a class="star-cta" href="https://github.com/llavkush/blanq" target="_blank">
      <span class="star-icon">★</span> Star on GitHub
    </a>
    <div class="links">
      <a href="https://llavkush.github.io/blanq/" target="_blank">Home</a>
      <span>·</span>
      <a href="https://llavkush.github.io/blanq/privacy.html" target="_blank">Privacy</a>
      <span>·</span>
      <a href="https://github.com/llavkush/blanq/issues/new" target="_blank">Report bug</a>
    </div>
  </body>
</html>
